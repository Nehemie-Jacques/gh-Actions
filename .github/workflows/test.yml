name: Test Workflow
on: push
jobs: 
 test:
   runs-on: ubuntu-latest
   steps:
     - name: Get code
       uses: actions/checkout@v6.0.2
     - name: Install NodeJS
       uses: actions/setup-node@v3
       with:
         node-version: '16'
     - name: Install dependencies
       run: npm install
     - name: Run tests
       run: npm test